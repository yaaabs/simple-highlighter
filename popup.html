<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="popup">
    <header class="header">
      <div class="title">Simple Highlighter</div>
      <div class="subtitle">Select text on the page, then choose an action.</div>
    </header>

    <section class="section">
      <div class="sectionTitle">Color</div>
      <div class="colors" role="radiogroup" aria-label="Highlight color">
        <button class="colorBtn" type="button" data-color="#fff59d" aria-label="Yellow" title="Yellow"></button>
        <button class="colorBtn" type="button" data-color="#a7f3d0" aria-label="Green" title="Green"></button>
        <button class="colorBtn" type="button" data-color="#fbcfe8" aria-label="Pink" title="Pink"></button>
        <button class="colorBtn" type="button" data-color="#bfdbfe" aria-label="Blue" title="Blue"></button>
      </div>
    </section>

    <section class="section actions">
      <button id="highlight" class="primary" type="button">
        <span class="btnIcon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>
        </span>
        Highlight
      </button>

      <div class="row">
        <button id="erase" class="secondary" type="button">
          <span class="btnIcon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20H7l-4-4 9-9 8 8-5 5z"/><path d="M6 15l3 3"/></svg>
          </span>
          Erase
        </button>
        <button id="clearAll" class="secondary danger" type="button">
          <span class="btnIcon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
          </span>
          Clear
        </button>
      </div>
    </section>

    <div id="status" class="status" aria-live="polite"></div>

    <footer class="footer">
      <span>Handcrafted by </span>
      <a class="footerLink" href="https://yabutech.vercel.app/" target="_blank" rel="noreferrer">YabuTech</a>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
