<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <main class="popup">
      <header class="header">
        <div class="title">
          <span class="titleIcon" aria-hidden="true">
            <svg
              viewBox="0 0 24 24"
              width="16"
              height="16"
              fill="none"
              stroke="currentColor"
              stroke-width="2.2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M12 20h9" />
              <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z" />
            </svg>
          </span>
          <span>Simple</span>
          <span class="brandWord">Highlighter</span>
        </div>
        <p class="subtitle">Select text, then highlight, erase, or clear it in one clean workflow.</p>
      </header>

      <div class="panel">
        <section class="section" aria-labelledby="color-title">
          <div class="sectionHeader">
            <div id="color-title" class="sectionTitle">Color</div>
            <div class="sectionHint">Pick a tone before highlighting</div>
          </div>
          <div class="colors" role="group" aria-label="Highlight color">
            <button
              class="colorBtn"
              type="button"
              data-color="#fff59d"
              aria-label="Yellow"
              aria-pressed="true"
              title="Yellow"
            ></button>
            <button
              class="colorBtn"
              type="button"
              data-color="#a7f3d0"
              aria-label="Green"
              aria-pressed="false"
              title="Green"
            ></button>
            <button
              class="colorBtn"
              type="button"
              data-color="#fbcfe8"
              aria-label="Pink"
              aria-pressed="false"
              title="Pink"
            ></button>
            <button
              class="colorBtn"
              type="button"
              data-color="#bfdbfe"
              aria-label="Blue"
              aria-pressed="false"
              title="Blue"
            ></button>
          </div>
        </section>

        <section class="section actions" aria-label="Highlighter actions">
          <button id="highlight" class="primary actionPrimary" type="button">
            <span class="btnIcon" aria-hidden="true">
              <svg
                viewBox="0 0 24 24"
                width="15"
                height="15"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M12 20h9" />
                <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z" />
              </svg>
            </span>
            <span>Highlight</span>
          </button>

          <div class="row">
            <button id="erase" class="secondary actionSecondary" type="button">
              <span class="btnIcon" aria-hidden="true">
                <svg
                  viewBox="0 0 24 24"
                  width="15"
                  height="15"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M20 20H7l-4-4 9-9 8 8-5 5z" />
                  <path d="M6 15l3 3" />
                </svg>
              </span>
              <span>Erase</span>
            </button>

            <button id="clearAll" class="secondary danger actionSecondary" type="button">
              <span class="btnIcon" aria-hidden="true">
                <svg
                  viewBox="0 0 24 24"
                  width="15"
                  height="15"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M3 6h18" />
                  <path d="M8 6V4h8v2" />
                  <path d="M19 6l-1 14H6L5 6" />
                  <path d="M10 11v6" />
                  <path d="M14 11v6" />
                </svg>
              </span>
              <span>Clear</span>
            </button>
          </div>
        </section>
      </div>

      <div
        id="status"
        class="status"
        role="status"
        aria-live="polite"
        aria-atomic="true"
      ></div>

      <div class="tips">Right-click selected text for quick highlight options.</div>

      <footer class="footer">
        <span>Handcrafted by</span>
        <a
          class="footerLink"
          href="https://yabutech.vercel.app/"
          target="_blank"
          rel="noreferrer"
        >
          YabuTech
        </a>
      </footer>
    </main>

    <script src="../js/popup.js"></script>
  </body>
</html>
